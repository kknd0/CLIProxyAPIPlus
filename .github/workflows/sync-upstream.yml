name: Sync Upstream & Release

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  sync-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git

      - name: Fetch upstream
        run: |
          git fetch upstream --tags --force
          git fetch origin --tags --force

      - name: Sync main branch
        run: |
          git checkout main
          git merge upstream/main --no-edit || true
          git push origin main

      - name: Find latest upstream tag
        id: check_tag
        run: |
          # Get the latest tag from upstream by version sort
          LATEST_TAG=$(git tag -l 'v*' --sort=-version:refname | head -1)
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # Check if we already have a release with assets for this tag in THIS repo (not upstream)
          REPO="${{ github.repository }}"
          ASSET_COUNT=$(gh api "repos/$REPO/releases/tags/$LATEST_TAG" --jq '.assets | length' 2>/dev/null || echo "0")
          if [ "$ASSET_COUNT" -gt "0" ]; then
            echo "Release $LATEST_TAG already has $ASSET_COUNT assets, skipping."
            echo "need_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New release needed for $LATEST_TAG (assets: $ASSET_COUNT)"
            echo "need_release=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push latest tag
        if: steps.check_tag.outputs.need_release == 'true'
        run: |
          TAG="${{ steps.check_tag.outputs.latest_tag }}"
          git push origin "$TAG" --force

      - uses: actions/setup-go@v4
        if: steps.check_tag.outputs.need_release == 'true'
        with:
          go-version: '>=1.26.0'
          cache: true

      - name: Checkout tag
        if: steps.check_tag.outputs.need_release == 'true'
        run: |
          TAG="${{ steps.check_tag.outputs.latest_tag }}"
          git checkout "$TAG"

      - name: Refresh models catalog
        if: steps.check_tag.outputs.need_release == 'true'
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Generate Build Metadata
        if: steps.check_tag.outputs.need_release == 'true'
        run: |
          echo "VERSION=${{ steps.check_tag.outputs.latest_tag }}" >> $GITHUB_ENV
          echo COMMIT=$(git rev-parse --short HEAD) >> $GITHUB_ENV
          echo BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) >> $GITHUB_ENV

      - name: Run GoReleaser
        if: steps.check_tag.outputs.need_release == 'true'
        uses: goreleaser/goreleaser-action@v4
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.check_tag.outputs.latest_tag }}
          VERSION: ${{ env.VERSION }}
          COMMIT: ${{ env.COMMIT }}
          BUILD_DATE: ${{ env.BUILD_DATE }}
